name: Flutter iOS Release

# Reusable workflow: builds a signed IPA from a Flutter project and
# (optionally) uploads it to TestFlight. Designed to mirror the secret
# names + skip-when-absent behaviour of `xcode-release.yml`, so callers
# can swap between native Xcode and Flutter without re-learning the
# inputs.
#
# The Flutter project doesn't commit `ios/` (regenerated per checkout);
# this workflow runs `flutter create --platforms=ios .` so the call
# site needs to pass `--project-name` and `--org` once via inputs.
#
# Usage:
#   jobs:
#     ios:
#       uses: Zebra-Party/pipeline-core/.github/workflows/flutter-ios-release.yml@main
#       with:
#         app_name: "WifesCookbook"
#         flutter_project_name: "wifes_cookbook"
#         flutter_org: "party.zebra"
#       secrets:
#         APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
#         APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
#         APPLE_IOS_DISTRIBUTION_PROVISION: ${{ secrets.APPLE_IOS_DISTRIBUTION_PROVISION }}
#         APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
#         APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
#         APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}

on:
  workflow_call:
    inputs:
      app_name:
        description: "Output IPA basename (no extension)"
        type: string
        required: true
      flutter_project_name:
        description: "Dart package name (e.g. wifes_cookbook). Passed to `flutter create --project-name`."
        type: string
        required: true
      flutter_org:
        description: "Reverse-DNS org for the iOS bundle ID prefix (e.g. party.zebra). Passed to `flutter create --org`."
        type: string
        required: true
      bundle_id:
        description: |
          Optional override of the iOS bundle identifier. Use when the
          desired bundle ID isn't `<flutter_org>.<lowerCamelCase(flutter_project_name)>`
          (e.g. project name is `wifes_cookbook` but the bundle ID is
          `com.zebraparty.wifescookbook`). Set as `PRODUCT_BUNDLE_IDENTIFIER`
          on the xcodebuild archive call.
        type: string
        default: ""
      flutter_version:
        description: "Flutter SDK version (subosito/flutter-action format)"
        type: string
        default: "3.41.x"
      runner:
        description: "JSON array of runner labels"
        type: string
        default: '["self-hosted", "macOS", "olympus"]'
      run_build_runner:
        description: "Run `dart run build_runner build` after `flutter pub get` (for projects using Drift, Freezed, etc.)"
        type: boolean
        default: true
      upload_to_testflight:
        description: "Upload to TestFlight on merges to main"
        type: boolean
        default: true
    secrets:
      APPLE_CERTIFICATE_P12_BASE64:
        required: true
      APPLE_CERTIFICATE_PASSWORD:
        required: true
      APPLE_IOS_DISTRIBUTION_PROVISION:
        required: false
      APP_STORE_CONNECT_ISSUER_ID:
        required: false
      APP_STORE_CONNECT_KEY_ID:
        required: false
      APP_STORE_CONNECT_PRIVATE_KEY_BASE64:
        required: false

jobs:
  ios:
    name: Flutter iOS build & upload
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: 60
    env:
      APP_NAME: ${{ inputs.app_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: Zebra-Party/pipeline-core
          ref: main
          path: .pipeline-core

      - name: Select Xcode
        run: bash .pipeline-core/scripts/select_xcode.sh

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      - name: Materialise platform folders
        # `ios/` is gitignored and regenerated here so it can never drift
        # behind the Flutter SDK. Mirrors what the project's CI workflow
        # does — keep them in sync if you change one.
        #
        # Inputs are passed via env, not interpolated into the run block,
        # so a malicious value couldn't break out of the shell quoting.
        env:
          FLUTTER_ORG: ${{ inputs.flutter_org }}
          FLUTTER_PROJECT_NAME: ${{ inputs.flutter_project_name }}
        run: flutter create --platforms=ios --org "$FLUTTER_ORG" --project-name "$FLUTTER_PROJECT_NAME" .

      - run: flutter pub get

      - name: Generate code (build_runner)
        if: inputs.run_build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check signing secrets
        id: signing
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_IOS_DISTRIBUTION_PROVISION: ${{ secrets.APPLE_IOS_DISTRIBUTION_PROVISION }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_P12_BASE64" ] || [ -z "$APPLE_IOS_DISTRIBUTION_PROVISION" ]; then
            echo "::warning::iOS signing secrets not set — skipping build and upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute version
        if: steps.signing.outputs.skip != 'true'
        id: version
        run: bash .pipeline-core/scripts/compute_version.sh

      - name: Configure iOS signing
        if: steps.signing.outputs.skip != 'true'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_DISTRIBUTION_PROVISION: ${{ secrets.APPLE_IOS_DISTRIBUTION_PROVISION }}
          PLATFORM: ios
        run: bash .pipeline-core/scripts/configure_xcode_signing.sh

      - name: Build IPA
        if: steps.signing.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build }}
          BUNDLE_ID: ${{ inputs.bundle_id }}
        run: bash .pipeline-core/scripts/build_flutter_ios.sh

      - name: Upload to TestFlight
        if: >-
          steps.signing.outputs.skip != 'true' &&
          inputs.upload_to_testflight &&
          github.ref == 'refs/heads/main' &&
          github.event_name != 'pull_request'
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
        run: |
          if [ -z "$APP_STORE_CONNECT_ISSUER_ID" ] || [ -z "$APP_STORE_CONNECT_KEY_ID" ] || [ -z "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" ]; then
            echo "::warning::App Store Connect API key not set — skipping upload."
            exit 0
          fi
          bash .pipeline-core/scripts/upload_ios.sh

      - name: Clean up signing artefacts
        if: always()
        run: |
          # shellcheck source=/dev/null
          . .pipeline-core/scripts/keychain_helpers.sh
          keychain_destroy "${KEYCHAIN_PATH:-}"
          rm -f "${INSTALLED_PROVISIONING_PROFILE:-}"
