          fi

      - name: Compute version
        if: steps.signing.outputs.skip != 'true'
        id: version
        run: bash .pipeline-core/scripts/compute_version.sh

      - name: Configure tvOS signing
        if: steps.signing.outputs.skip != 'true'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_DISTRIBUTION_PROVISION: ${{ secrets.APPLE_TVOS_PROVISION }}
          PLATFORM: appletvos
        run: bash .pipeline-core/scripts/configure_xcode_signing.sh

      - name: Build tvOS IPA
        if: steps.signing.outputs.skip != 'true'
