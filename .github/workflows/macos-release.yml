name: macOS Release

# Reusable workflow: macOS build (.app + .pkg) + optional TestFlight upload.
# Gracefully skips signing/upload if secrets are absent.
#
# Usage:
#   jobs:
#     macos:
#       needs: test
#       uses: Zebra-Party/pipeline-core/.github/workflows/macos-release.yml@v1
#       with:
#         godot_version: "4.6.2-stable"
#         app_name: "Puzzle70s"
#       secrets: inherit

on:
  workflow_call:
    inputs:
      godot_version:
        type: string
        default: "4.6.2-stable"
      runner:
        description: 'JSON array of runner labels'
        type: string
        default: '["self-hosted", "macOS", "ephemeral"]'
      app_name:
        description: "Base filename for .app / .pkg (no extension)"
        type: string
        default: "export"
      macos_preset:
        description: "Godot export preset name for macOS"
        type: string
        default: "macOS (Universal)"
      upload_to_testflight:
        description: "Upload to TestFlight on merges to main"
        type: boolean
        default: true
      pre_export_script:
        description: "Optional project script to run before Godot export"
        type: string
        default: ""

jobs:
  macos:
    name: macOS build & upload
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: 45
    env:
      GODOT_VERSION: ${{ inputs.godot_version }}
      APP_NAME: ${{ inputs.app_name }}
      MACOS_PRESET: ${{ inputs.macos_preset }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/checkout@v6
        with:
          repository: Zebra-Party/pipeline-core
          # Pin scripts to the major tag this workflow ships under. Do NOT use
          # github.workflow_sha: in a reusable (workflow_call) context it resolves
          # to the CALLER's commit, which is not a ref in this repo (broke every
          # consumer release in #36). Bump this literal to v2 on the v2 branch.
          ref: v1
          path: .pipeline-core

      - name: Select Xcode
        run: bash .pipeline-core/scripts/select_xcode.sh

      - name: Install Godot & export templates
        run: bash .pipeline-core/scripts/install_godot.sh "$GODOT_VERSION"

      - name: Compute version
        id: version
        run: bash .pipeline-core/scripts/compute_version.sh

      - name: Apply version to project + presets
        run: bash .pipeline-core/scripts/set_version.sh "${{ steps.version.outputs.version }}" "${{ steps.version.outputs.build }}"

      - name: Reimport
        run: bash .pipeline-core/scripts/godot_import.sh

      - name: Configure macOS signing
        id: signing
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_MACOS_DISTRIBUTION_PROVISION: ${{ secrets.APPLE_MACOS_DISTRIBUTION_PROVISION }}
          APPLE_MAC_INSTALLER_P12_BASE64: ${{ secrets.APPLE_MAC_INSTALLER_P12_BASE64 }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_P12_BASE64" ] || [ -z "$APPLE_MACOS_DISTRIBUTION_PROVISION" ]; then
            echo "::warning::macOS signing secrets not set — skipping build/upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          bash .pipeline-core/scripts/configure_macos_signing.sh
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Pre-export script
        if: steps.signing.outputs.skip != 'true' && inputs.pre_export_script != ''
        run: bash ${{ inputs.pre_export_script }}

      - name: Build .app + .pkg
        if: steps.signing.outputs.skip != 'true'
        run: bash .pipeline-core/scripts/build_macos.sh

      - name: Upload to TestFlight
        if: >-
          steps.signing.outputs.skip != 'true' &&
          inputs.upload_to_testflight &&
          github.ref == 'refs/heads/main' &&
          github.event_name != 'pull_request'
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
        run: |
          if [ -z "$APP_STORE_CONNECT_ISSUER_ID" ] || [ -z "$APP_STORE_CONNECT_KEY_ID" ] || [ -z "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" ]; then
            echo "::warning::App Store Connect API key not set — skipping upload."
            exit 0
          fi
          bash .pipeline-core/scripts/upload_macos.sh

      - name: Tag release
        if: >-
          steps.signing.outputs.skip != 'true' &&
          github.ref == 'refs/heads/main' &&
          github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "v$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists — skipping."
          else
            gh release create "v$VERSION" \
              --repo "${{ github.repository }}" \
              --title "v$VERSION" \
              --generate-notes \
              --latest \
              || echo "Release creation skipped (may have been created by a parallel job)."
          fi

      - name: Clean up signing artefacts
        if: always()
        run: |
          # shellcheck source=/dev/null
          . .pipeline-core/scripts/keychain_helpers.sh
          keychain_destroy "${KEYCHAIN_PATH:-}"
          rm -f "${INSTALLED_PROVISIONING_PROFILE:-}"

      - name: Restore export_presets.cfg
        if: always()
        run: git checkout -- export_presets.cfg || true
